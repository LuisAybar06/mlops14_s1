name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Ceheckout code
        uses: actions/checkout@v3

      - name: Set up Pyhton
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
          
      - name: Run tests
        run: |
          python -m unittest tests/test_main.py
