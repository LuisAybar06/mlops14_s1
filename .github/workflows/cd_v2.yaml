name: Deploy VERTEX PIPELINE

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.GOOGLE_PROJECT }}
          service_account_key: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          install_components: 'gke-gcloud-auth-plugin'
          export_default_credentials: true


      - name: build and push the docker image 
        env:
          GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }} 
        run: | 
          gcloud auth configure-docker us-central1-docker.pkg.dev
          docker build -t us-central1-docker.pkg.dev/$GOOGLE_PROJECT/$IMAGE_REPOSITORY/$IMAGE_NAME:latest ./despliegue_cloud_run
          docker push us-central1-docker.pkg.dev/$GOOGLE_PROJECT/$IMAGE_REPOSITORY/$IMAGE_NAME:latest

      - name: Deploy Cloud Run Job
        env:
          GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }} 
        run: |
          gcloud run jobs deploy run-pipeline-job \
            --image us-central1-docker.pkg.dev/$GOOGLE_PROJECT/$IMAGE_REPOSITORY/$IMAGE_NAME \
            --region $REGION \
            --service-account cloud-run-sa@$GOOGLE_PROJECT.iam.gserviceaccount.com \
            --set-env-vars PROJECT_ID=mlops-test-487414,LOCATION=us-central1,PIPELINE_PATH=gs://vertex_pipelines_mlops/demo/pipeline_bigquery.json,SERVICE_ACCOUNT=vertex-ia-procces@mlops-test-487414.iam.gserviceaccount.com,VALIDA_TABLE=mlops-test-487414.testgithub.census_by_age,INPUT_AGE=60 \
            --quiet
